<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Radiance Lab | 光谱分析工作台</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Radiance Lab</p>
          <h1>红外辐射与谱辐亮度分析工作台</h1>
        </div>
        <div class="topbar__meta">
          <span>多曲线对比</span>
          <span>图例控制</span>
          <span>单位换算</span>
        </div>
      </header>

      <main class="workspace">
        <aside class="sidebar">
          <section class="dock">
            <div class="dock__head">
              <div>
                <p class="section-label">当前曲线</p>
                <h2 id="editorTitle">参数编辑</h2>
              </div>
              <span class="active-chip" id="activeCurveBadge"></span>
            </div>

            <form id="curveForm" class="editor-form">
              <div class="form-grid">
                <label>
                  <span>名称</span>
                  <input id="nameInput" name="name" type="text" maxlength="24" />
                </label>
                <label>
                  <span>颜色</span>
                  <input id="colorInput" name="color" type="color" value="#ff8a3d" />
                </label>
                <label>
                  <span>温度 T / K</span>
                  <input id="temperatureInput" name="temperature" type="number" min="1" step="1" />
                </label>
                <label>
                  <span>发射率 ε</span>
                  <input id="emissivityInput" name="emissivity" type="number" min="0.01" max="1" step="0.01" />
                </label>
                <label>
                  <span>起始波长 / um</span>
                  <input id="lambdaMinInput" name="lambdaMin" type="number" min="0.01" step="0.01" />
                </label>
                <label>
                  <span>结束波长 / um</span>
                  <input id="lambdaMaxInput" name="lambdaMax" type="number" min="0.02" step="0.01" />
                </label>
                <label>
                  <span>采样点数</span>
                  <input id="sampleCountInput" name="sampleCount" type="number" min="120" max="3000" step="20" />
                </label>
                <label class="checkbox-field">
                  <span>图例显示</span>
                  <input id="visibleInput" name="visible" type="checkbox" />
                </label>
              </div>

              <p class="helper-text" id="statusText">
                当前曲线参数修改后会即时更新图谱与摘要。
              </p>
            </form>
          </section>

          <section class="dock">
            <div class="dock__head">
              <div>
                <p class="section-label">曲线管理</p>
                <h2>分析对象</h2>
              </div>
              <button class="ghost-btn" id="addCurveButton" type="button">新增曲线</button>
            </div>

            <div class="curve-list" id="curveList"></div>

            <div class="mini-actions">
              <button class="ghost-btn ghost-btn--soft" id="presetGroupButton" type="button">
                加入 3 条示例
              </button>
            </div>
          </section>

          <section class="dock">
            <div class="dock__head">
              <div>
                <p class="section-label">全局显示</p>
                <h2>坐标与单位</h2>
              </div>
            </div>

            <form id="displayForm" class="editor-form">
              <div class="form-grid form-grid--single">
                <label>
                  <span>光谱变量</span>
                  <select id="spectralVariableInput" name="spectralVariable">
                    <option value="wavelength">按波长</option>
                    <option value="wavenumber">按波数</option>
                  </select>
                </label>
                <label>
                  <span>辐亮度单位</span>
                  <select id="radianceUnitInput" name="radianceUnit">
                    <option value="w_m2_sr_um">W/(m2·sr·um)</option>
                    <option value="w_cm2_sr_um">W/(cm2·sr·um)</option>
                    <option value="w_m2_sr_cm-1">W/(m2·sr·cm-1)</option>
                    <option value="w_cm2_sr_cm-1">W/(cm2·sr·cm-1)</option>
                  </select>
                </label>
                <label>
                  <span>纵轴模式</span>
                  <select id="scaleModeInput" name="scaleMode">
                    <option value="linear">线性</option>
                    <option value="log">对数</option>
                  </select>
                </label>
              </div>

              <div class="mini-actions">
                <button class="ghost-btn" id="copyButton" type="button">复制当前摘要</button>
              </div>
            </form>
          </section>
        </aside>

        <section class="main-stage">
          <section class="dock dock--chart">
            <div class="dock__head">
              <div>
                <p class="section-label">光谱图</p>
                <h2>多曲线叠加视图</h2>
              </div>
              <div class="chart-toolbar">
                <span class="chart-note" id="chartNote"></span>
                <button class="ghost-btn ghost-btn--soft" id="fitAllButton" type="button">重置视图</button>
              </div>
            </div>

            <div class="chart-panel">
              <div class="chart-stack">
                <div class="chart-wrap">
                  <svg id="chartSvg" viewBox="0 0 1120 560" aria-label="多曲线辐亮度图" role="img"></svg>
                  <div id="chartTooltip" class="chart-tooltip" hidden></div>
                </div>
                <div class="navigator-wrap">
                  <div class="navigator-head">
                    <span>缩放窗口</span>
                    <div class="navigator-fields">
                      <label>
                        <span>start</span>
                        <input id="zoomStartInput" type="number" step="0.01" />
                      </label>
                      <label>
                        <span>end</span>
                        <input id="zoomEndInput" type="number" step="0.01" />
                      </label>
                    </div>
                  </div>
                  <div class="navigator-track" id="navigatorTrack">
                    <svg id="navigatorSvg" viewBox="0 0 1120 110" aria-label="缩放导航图" role="img"></svg>
                    <div class="navigator-window" id="navigatorWindow">
                      <button class="navigator-handle navigator-handle--left" id="navigatorHandleLeft" type="button" aria-label="左侧缩放手柄"></button>
                      <button class="navigator-handle navigator-handle--right" id="navigatorHandleRight" type="button" aria-label="右侧缩放手柄"></button>
                    </div>
                  </div>
                </div>
              </div>
              <aside class="legend-panel">
                <div class="legend-panel__head">
                  <p class="section-label">图例</p>
                  <h3>显示曲线</h3>
                </div>
                <div id="legendList" class="legend-list"></div>
              </aside>
            </div>
          </section>

          <section class="metrics-row">
            <div class="summary-grid" id="summaryGrid"></div>
            <div class="dock detail-dock">
              <div class="dock__head">
                <div>
                  <p class="section-label">选中曲线</p>
                  <h2>关键数值</h2>
                </div>
              </div>
              <div class="metric-list" id="bandMetrics"></div>
            </div>
          </section>

          <section class="dock">
            <div class="dock__head">
              <div>
                <p class="section-label">理论速览</p>
                <h2>红外辐射基础</h2>
              </div>
            </div>

            <div class="theory-grid" id="theoryGrid">
              <button class="theory-card is-active" type="button" data-theory="planck">
                <strong>Planck 定律</strong>
                <span>描述黑体在不同波长下的谱辐射分布。</span>
              </button>
              <button class="theory-card" type="button" data-theory="wien">
                <strong>Wien 位移定律</strong>
                <span>给出温度与峰值波长的反比关系。</span>
              </button>
              <button class="theory-card" type="button" data-theory="stefan">
                <strong>Stefan-Boltzmann 定律</strong>
                <span>给出总辐射出射度与温度四次方的关系。</span>
              </button>
              <button class="theory-card" type="button" data-theory="infrared">
                <strong>红外波段</strong>
                <span>区分近红外、中红外和远红外的常见范围。</span>
              </button>
            </div>

            <article class="theory-detail" id="theoryDetail"></article>
          </section>
        </section>
      </main>
    </div>

    <script src="./app.multi.js"></script>
  </body>
</html>
